repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (autofix and stage)
        entry: bash -c 'ruff check --fix "$@" && git add "$@"' --
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format (autofix and stage)
        entry: bash -c 'ruff format "$@" && git add "$@"' --
        language: system
        types: [python]
      - id: ty-check
        name: ty check
        entry: uv run ty check src
        language: system
        pass_filenames: false

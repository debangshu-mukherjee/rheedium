version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - python docs/build_notebook_cache.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - test
        - notebooks

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

name: Tests

on:
  push:
    branches:
      - '**'  # Run on all branches
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-python:
    name: Resolve Python versions from pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      latest: ${{ steps.parse.outputs.latest }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Parse Python versions from classifiers
      id: parse
      run: |
        versions=$(grep 'Programming Language :: Python :: 3\.' pyproject.toml \
          | grep -oP '3\.\d+' \
          | sort -t. -k2 -n \
          | jq -Rc . \
          | jq -sc .)
        latest=$(echo "$versions" | jq -r '.[-1]')
        echo "versions=$versions" >> "$GITHUB_OUTPUT"
        echo "latest=$latest" >> "$GITHUB_OUTPUT"
        echo "Detected Python versions: $versions (latest: $latest)"

  test:
    name: Run tests and collect coverage
    needs: resolve-python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJSON(needs.resolve-python.outputs.versions) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 2

    # The automaton smoke tests spawn `uv run --with-editable .` subprocesses,
    # each of which materializes a fresh ephemeral environment (jax, matplotlib,
    # pandas, …) alongside the synced .venv. On the ~14 GB ubuntu runner these
    # exhaust the disk ("No space left on device"). Reclaim the large
    # preinstalled toolchains we do not use before building any environment.
    - name: Free disk space (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "Disk before cleanup:"; df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost
        sudo docker image prune --all --force || true
        echo "Disk after cleanup:"; df -h /

    # Defender real-time scanning of every extracted wheel / imported .py file
    # dominates Windows runner time for a large Python/JAX dependency tree.
    # Excluding the workspace (which holds the copied .venv) removes that tax.
    - name: Exclude workspace from Windows Defender
      if: runner.os == 'Windows'
      shell: pwsh
      run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Lint with Ruff
      run: |
        uv run ruff check src/ tests/ automatons/
        uv run ruff format --check src/ tests/ automatons/
        uv run interrogate tests

    - name: Type check with ty
      run: |
        uv run ty check

    - name: Type check with beartype (runtime)
      run: |
        uv run python -c "import rheedium; print('Beartype validation passed')"

    - name: Run tests
      env:
        JAX_PLATFORMS: cpu
      run: uv run pytest --cov=src/rheedium --cov-branch --cov-report=xml --cov-report=html --cov-report=term-missing --junitxml=test-results.xml -v

    - name: List generated files (debug)
      if: always()
      run: |
        echo "Current directory:"
        pwd
        echo "Files in current directory:"
        ls -la
        echo "Checking for test artifacts:"
        if [ -f "test-results.xml" ]; then echo "✓ test-results.xml found"; else echo "✗ test-results.xml not found"; fi
        if [ -f "coverage.xml" ]; then echo "✓ coverage.xml found"; else echo "✗ coverage.xml not found"; fi
        if [ -d "htmlcov" ]; then echo "✓ htmlcov/ found"; else echo "✗ htmlcov/ not found"; fi
      shell: bash

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: debangshu-mukherjee/rheedium
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          test-results.xml
          htmlcov/
          coverage.xml
        if-no-files-found: warn

    - name: Publish test results to job summary
      if: always() && matrix.os == 'ubuntu-latest'
      shell: bash
      env:
        PYV: ${{ matrix.python-version }}
      run: |
        python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
        import glob, os, xml.etree.ElementTree as ET

        pyv = os.environ.get("PYV", "?")
        files = glob.glob("test-results.xml")
        if not files:
            print(f"## Test Results (Python {pyv}) — no results file")
            raise SystemExit(0)

        total = failures = errors = skipped = 0
        seconds = 0.0
        failed = []
        for path in files:
            for suite in ET.parse(path).getroot().iter("testsuite"):
                total += int(suite.get("tests", 0))
                failures += int(suite.get("failures", 0))
                errors += int(suite.get("errors", 0))
                skipped += int(suite.get("skipped", 0))
                seconds += float(suite.get("time", 0) or 0)
                for case in suite.iter("testcase"):
                    if (case.find("failure") is not None
                            or case.find("error") is not None):
                        cls = case.get("classname", "")
                        name = case.get("name", "")
                        failed.append(f"{cls}::{name}")
        passed = total - failures - errors - skipped
        ok = failures == 0 and errors == 0
        mark = "✅ passed" if ok else "❌ failed"
        print(f"## Test Results (Python {pyv}) — {mark}")
        print()
        print("| total | passed | failed | errors | skipped | time |")
        print("|---|---|---|---|---|---|")
        print(
            f"| {total} | {passed} | {failures} | {errors} "
            f"| {skipped} | {seconds:.1f}s |"
        )
        if failed:
            print()
            print("<details><summary>Failed / errored tests</summary>")
            print()
            print("```")
            print("\n".join(failed))
            print("```")
            print()
            print("</details>")
        PY

  build:
    runs-on: ubuntu-latest
    needs: [resolve-python, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Build package
      run: uv build

    - name: Check built artifacts
      run: |
        # Install the built wheel into a clean ephemeral environment and
        # import the package — verifies wheel contents, metadata, and
        # dependency resolution in one uv-native step.
        uv run --isolated --no-project --with dist/rheedium-*.whl \
          python -c "import rheedium; print(rheedium.__version__)"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist/

  automatons-smoke:
    name: Automatons smoke
    needs: resolve-python
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    # Each `uv run --with-editable .` below builds a fresh ephemeral environment;
    # across all automatons these exhaust the ~14 GB runner disk. Reclaim the
    # large preinstalled toolchains we do not use first.
    - name: Free disk space
      shell: bash
      run: |
        echo "Disk before cleanup:"; df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/share/boost
        sudo docker image prune --all --force || true
        echo "Disk after cleanup:"; df -h /

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run automaton smoke tests
      env:
        JAX_PLATFORMS: cpu
      shell: bash
      run: |
        mkdir -p "$RUNNER_TEMP/automatons"
        for script in automatons/*.py; do
          [ "$(basename "$script")" = "bump_pin.py" ] && continue
          outdir="$RUNNER_TEMP/automatons/$(basename "$script" .py)"
          uv run --with-editable . "$script" --smoke --outdir "$outdir" --json
        done

  type-safety-scan:
    name: Strict type scan (informational)
    needs: resolve-python
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Install dependencies
      run: uv sync --extra dev

    # Surfaces the type-checker rules that are suppressed project-wide because
    # of jaxtyping/beartype false positives (see [tool.ty.rules] in
    # pyproject.toml). This job NEVER blocks CI (`--exit-zero`); it exists so a
    # new real bug in these categories is visible for review instead of being
    # silently swallowed. Graduate a rule back to "error" in pyproject once its
    # count reaches zero (as was done for unresolved-attribute).
    - name: Strict ty scan (non-blocking)
      shell: bash
      run: |
        uv run ty check src \
          --error=invalid-assignment \
          --error=invalid-argument-type \
          --error=no-matching-overload \
          --error=missing-argument \
          --error=unknown-argument \
          --error=too-many-positional-arguments \
          --exit-zero --output-format=concise 1>scan.txt 2>/dev/null
        count=$(grep -cE 'error\[' scan.txt || true)
        {
          echo "## Strict type-safety scan (informational)"
          echo ""
          echo "Rules suppressed project-wide for jaxtyping/beartype false"
          echo "positives, surfaced here for review. **Does not block CI.**"
          echo ""
          echo "**Diagnostics in \`src/\`: ${count}**"
          echo ""
          echo "<details><summary>Show diagnostics</summary>"
          echo ""
          echo '```'
          grep -E 'error\[' scan.txt || echo "(none)"
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "Strict type scan: ${count} diagnostics in src/ (informational, non-blocking)."

  pyright-scan:
    name: Pyright scan (informational)
    needs: resolve-python
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Install dependencies
      run: uv sync --extra dev

    # Second-opinion type check with pyright, using the same [tool.pyright]
    # suppressions the editor (Pylance) already follows. `ty` stays the enforced
    # checker; pyright runs here purely informationally to surface categories
    # ty's suppressions hide (e.g. reportIndexIssue). NEVER blocks CI (`|| true`).
    - name: Pyright scan (non-blocking)
      shell: bash
      run: |
        uv run pyright src 1>scan.txt 2>/dev/null || true
        count=$(grep -cE ' - error:' scan.txt || true)
        {
          echo "## Pyright scan (informational)"
          echo ""
          echo "Second-opinion static check (pyright, [tool.pyright] config)."
          echo "**Does not block CI.**"
          echo ""
          echo "**Diagnostics in \`src/\`: ${count}**"
          echo ""
          echo "<details><summary>Show diagnostics</summary>"
          echo ""
          echo '```'
          grep -E ' - (error|warning):' scan.txt || echo "(none)"
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "Pyright scan: ${count} diagnostics in src/ (informational, non-blocking)."

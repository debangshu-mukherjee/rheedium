name: Tests

on:
  push:
    branches:
      - '**'  # Run on all branches
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-python:
    name: Resolve Python versions from pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      latest: ${{ steps.parse.outputs.latest }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Parse Python versions from classifiers
      id: parse
      run: |
        versions=$(grep 'Programming Language :: Python :: 3\.' pyproject.toml \
          | grep -oP '3\.\d+' \
          | sort -t. -k2 -n \
          | jq -Rc . \
          | jq -sc .)
        latest=$(echo "$versions" | jq -r '.[-1]')
        echo "versions=$versions" >> "$GITHUB_OUTPUT"
        echo "latest=$latest" >> "$GITHUB_OUTPUT"
        echo "Detected Python versions: $versions (latest: $latest)"

  test:
    name: Run tests and collect coverage
    needs: resolve-python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJSON(needs.resolve-python.outputs.versions) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Lint with Ruff
      run: |
        uv run ruff check src/ tests/
        uv run ruff format --check src/ tests/

    - name: Type check with ty
      run: |
        uv run ty check

    - name: Type check with beartype (runtime)
      run: |
        uv run python -c "import rheedium; print('Beartype validation passed')"

    - name: Run tests
      env:
        JAX_PLATFORMS: cpu
      run: uv run pytest --cov=src/rheedium --cov-branch --cov-report=xml --cov-report=html --cov-report=term-missing --junitxml=test-results.xml -v

    - name: List generated files (debug)
      if: always()
      run: |
        echo "Current directory:"
        pwd
        echo "Files in current directory:"
        ls -la
        echo "Checking for test artifacts:"
        if [ -f "test-results.xml" ]; then echo "✓ test-results.xml found"; else echo "✗ test-results.xml not found"; fi
        if [ -f "coverage.xml" ]; then echo "✓ coverage.xml found"; else echo "✗ coverage.xml not found"; fi
        if [ -d "htmlcov" ]; then echo "✓ htmlcov/ found"; else echo "✗ htmlcov/ not found"; fi
      shell: bash

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: debangshu-mukherjee/rheedium
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          test-results.xml
          htmlcov/
          coverage.xml
        if-no-files-found: warn

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && matrix.os == 'ubuntu-latest'
      with:
        files: test-results.xml
        check_name: Test Results (Python ${{ matrix.python-version }})
        comment_mode: always

  build:
    runs-on: ubuntu-latest
    needs: [resolve-python, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Install build dependencies
      run: uv sync --extra dev

    - name: Build package
      run: uv build

    - name: Check package metadata
      run: |
        uv run python -m twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist/

  type-safety-scan:
    name: Strict type scan (informational)
    needs: resolve-python
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Install dependencies
      run: uv sync --extra dev

    # Surfaces the type-checker rules that are suppressed project-wide because
    # of jaxtyping/beartype false positives (see [tool.ty.rules] in
    # pyproject.toml). This job NEVER blocks CI (`--exit-zero`); it exists so a
    # new real bug in these categories is visible for review instead of being
    # silently swallowed. Graduate a rule back to "error" in pyproject once its
    # count reaches zero (as was done for unresolved-attribute).
    - name: Strict ty scan (non-blocking)
      shell: bash
      run: |
        uv run ty check src \
          --error=invalid-assignment \
          --error=invalid-argument-type \
          --error=no-matching-overload \
          --error=missing-argument \
          --error=unknown-argument \
          --error=too-many-positional-arguments \
          --exit-zero --output-format=concise 1>scan.txt 2>/dev/null
        count=$(grep -cE 'error\[' scan.txt || true)
        {
          echo "## Strict type-safety scan (informational)"
          echo ""
          echo "Rules suppressed project-wide for jaxtyping/beartype false"
          echo "positives, surfaced here for review. **Does not block CI.**"
          echo ""
          echo "**Diagnostics in \`src/\`: ${count}**"
          echo ""
          echo "<details><summary>Show diagnostics</summary>"
          echo ""
          echo '```'
          grep -E 'error\[' scan.txt || echo "(none)"
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "Strict type scan: ${count} diagnostics in src/ (informational, non-blocking)."

  pyright-scan:
    name: Pyright scan (informational)
    needs: resolve-python
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install ${{ needs.resolve-python.outputs.latest }}

    - name: Install dependencies
      run: uv sync --extra dev

    # Second-opinion type check with pyright, using the same [tool.pyright]
    # suppressions the editor (Pylance) already follows. `ty` stays the enforced
    # checker; pyright runs here purely informationally to surface categories
    # ty's suppressions hide (e.g. reportIndexIssue). NEVER blocks CI (`|| true`).
    - name: Pyright scan (non-blocking)
      shell: bash
      run: |
        uv run pyright src 1>scan.txt 2>/dev/null || true
        count=$(grep -cE ' - error:' scan.txt || true)
        {
          echo "## Pyright scan (informational)"
          echo ""
          echo "Second-opinion static check (pyright, [tool.pyright] config)."
          echo "**Does not block CI.**"
          echo ""
          echo "**Diagnostics in \`src/\`: ${count}**"
          echo ""
          echo "<details><summary>Show diagnostics</summary>"
          echo ""
          echo '```'
          grep -E ' - (error|warning):' scan.txt || echo "(none)"
          echo '```'
          echo ""
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"
        echo "Pyright scan: ${count} diagnostics in src/ (informational, non-blocking)."
